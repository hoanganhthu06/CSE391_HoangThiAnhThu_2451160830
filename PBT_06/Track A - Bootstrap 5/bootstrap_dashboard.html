<!DOCTYPE html>
<html lang="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="position-fixed top-0 start-0 vh-100 bg-dark text-white p-3" style="width: 250px;">
        <h4>Admin</h4>
        <div class="list-group">
            <a href="#" class="list-group-item list-group-item-action">Dashboard</a>
            <a href="#" class="list-group-item list-group-item-action">Orders</a>
            <a href="#" class="list-group-item list-group-item-action">Users</a>
        </div>
    </div>

    <div class="container-fluid" style="margin-left: 260px;">

        <nav class="navbar navbar-light bg-light mt-2">
            <span class="navbar-text">Trang quản trị</span>

            <div class="dropdown">
                <button class="btn btn-secondary dropdown-toggle" data-bs-toggle="dropdown">
                    User
                </button>
                <ul class="dropdown-menu">
                    <li><a class="dropdown-item" href="#">Profile</a></li>
                    <li><a class="dropdown-item" href="#">Logout</a></li>
                </ul>
            </div>
        </nav>

        <div class="alert alert-success mt-3">Thao tác thành công</div>

        <div class="row mt-3">
            <div class="col-md-3">
                <div class="card text-white bg-primary p-3">Doanh thu</div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-success p-3">Đơn hàng</div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-warning p-3">Khách hàng</div>
            </div>
            <div class="col-md-3">
                <div class="card text-white bg-danger p-3">Lỗi</div>
            </div>
        </div>

        <div class="mt-4">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Tên</th>
                        <th>Giá</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Sản phẩm A</td>
                        <td>500k</td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Sản phẩm B</td>
                        <td>600k</td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>Sản phẩm C</td>
                        <td>700k</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="input-group mt-4">
            <input type="text" class="form-control" placeholder="Tìm kiếm">
            <button class="btn btn-primary">Tìm</button>
        </div>

        <div class="accordion mt-4" id="faq">

            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#q1">
                        Câu hỏi 1
                    </button>
                </h2>
                <div id="q1" class="accordion-collapse collapse show">
                    <div class="accordion-body">Nội dung câu trả lời</div>
                </div>
            </div>

            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button" data-bs-toggle="collapse" data-bs-target="#q2">
                        Câu hỏi 2
                    </button>
                </h2>
                <div id="q2" class="accordion-collapse collapse show">
                    <div class="accordion-body">Nội dung câu trả lời</div>
                </div>
            </div>

        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
