<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Grid</title>
    <link rel="stylesheet" href="grid.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>My shop</h1>
        </header>

        <section class="hero">
            <div class="hero-card">
                <h2>Sản phẩm nổi bật</h2>
            </div>
            <div class="hero-card">
                <h2>Giảm giá 50%</h2>
            </div>
        </section>

        <aside class="sidebar">
            <h3>Bộ lọc</h3>
            <label><input type="checkbox">Giá rẻ</label><br>
            <label><input type="checkbox">Cao cấp</label><br>
            <label><input type="checkbox">Bán chạy</label><br>
        </aside>

        <main class="main">
            <div class="card"><img src="https://i.pinimg.com/736x/8e/04/63/8e04637504deccdc45bb3b377656b372.jpg"><p>Sản phẩm 1</p></div>
            <div class="card"><img src="https://i.pinimg.com/736x/58/23/1e/58231e31b0745bfdab9ced37bd2aa5b1.jpg"><p>Sản phẩm 2</p></div>
            <div class="card"><img src="https://i.pinimg.com/736x/41/ec/07/41ec07364690403f5d96b97046f52290.jpg"><p>Sản phẩm 3</p></div>
            <div class="card"><img src="https://i.pinimg.com/736x/d3/44/82/d3448281d82fcc7d91f656f0432ea1f6.jpg"><p>Sản phẩm 4</p></div>
            <div class="card"><img src="https://i.pinimg.com/736x/a7/ed/5a/a7ed5a3eb7584b482fe61211ebc04ac0.jpg"><p>Sản phẩm 5</p></div>
            <div class="card"><img src="https://i.pinimg.com/736x/80/92/43/809243a450ba5e0f127eb7d71a73601b.jpg"><p>Sản phẩm 6</p></div>
        </main>

        <aside class="ads">
            <img src="https://i.pinimg.com/736x/f4/60/2a/f4602a73ff28afca6c59a69997991856.jpg">
        </aside>

        <footer class="footer">
            <p>&copy 2026 My Shop</p>
        </footer>
    </div>
</body>
</html>
